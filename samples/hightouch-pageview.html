<script>
    /**
     * @returns {void}
     */
    (function(){
      if (typeof htevents === 'undefined') {
        console.log('htevents undefined');
      return;
      }
      
      var baseProperties = {{CJ - Base Properties}};
      var eventProperties = {
        mode: {{CJ - Mode}},
        promo_code: {{CJ - Dynamic - Promo Code}},
        status: {{DLV - Status}},
      };
      var payload = {{CJ - Build Payload}};
      var properties = Object.assign({}, baseProperties, eventProperties, payload);
      
      try {
        htevents.page({{CJ - Dynamic - Page Type}}, {{JavaScript - Page Title}}, properties);
      } catch(error) {
        console.error("Could not fire Hightouch 'Page View' event", error);
      }
    })()
  </script>
