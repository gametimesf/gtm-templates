<script>
    if (fbq !== undefined) {
      try {
        fbq('track', "AddToCart", {
          currency: "USD", 
          value: "{{DLV - Total Price}}",

          content_ids: "{{CJ - Dynamic - Listing ID}}"

      } catch(e) {
        console.error('Error firing Meta InitiateCheckout event', e)
      }
    }
  </script>
